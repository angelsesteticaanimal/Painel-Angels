<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#fffaf6">

  <title>Login Administrativo | Angels</title>

  <style>
    :root {
      --rosa: #d96f91;
      --rosa-escuro: #a84968;
      --creme: #fffaf6;
      --texto: #352a2f;
      --muted: #796d72;
      --linha: rgba(92, 66, 75, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--texto);
      background:
        radial-gradient(circle at top, #ffe8ef, transparent 45%),
        var(--creme);
      font-family: Arial, Helvetica, sans-serif;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      padding: 30px;
      background: white;
      border: 1px solid var(--linha);
      border-radius: 28px;
      box-shadow: 0 22px 70px rgba(79, 51, 60, 0.14);
    }

    .logo {
      width: 120px;
      height: 120px;
      display: block;
      margin: 0 auto 20px;
      object-fit: cover;
      border-radius: 28px;
      border: 1px solid var(--linha);
      background: #fff3f6;
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 30px;
    }

    .subtitle {
      margin: 0 0 26px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 16px;
    }

    label {
      display: grid;
      gap: 7px;
      font-weight: 800;
    }

    input {
      width: 100%;
      padding: 15px;
      border: 1px solid #ead4d0;
      border-radius: 15px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: var(--rosa);
      box-shadow: 0 0 0 3px rgba(217, 111, 145, 0.14);
    }

    button {
      min-height: 54px;
      margin-top: 4px;
      border: 0;
      border-radius: 16px;
      color: white;
      background: linear-gradient(135deg, var(--rosa), var(--rosa-escuro));
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    .mensagem {
      display: none;
      margin-top: 16px;
      padding: 13px;
      border-radius: 14px;
      text-align: center;
      font-weight: 700;
    }

    .mensagem.erro {
      display: block;
      color: #9f283c;
      background: #ffe3e9;
      border: 1px solid #f3aab7;
    }

    .mensagem.sucesso {
      display: block;
      color: #276232;
      background: #eaf7ec;
      border: 1px solid #bfe3c4;
    }

    .voltar {
      display: block;
      margin-top: 22px;
      color: var(--rosa-escuro);
      text-align: center;
      text-decoration: none;
      font-weight: 800;
    }
  </style>
</head>

<body>

  <main class="login-card">

    <img
      class="logo"
      src="logo.jpg"
      alt="Angels Estética Animal"
      onerror="this.style.display='none'">

    <h1>Painel Administrativo</h1>

    <p class="subtitle">
      Entre com o e-mail e a senha cadastrados no Firebase.
    </p>

    <form id="loginForm">

      <label>
        E-mail
        <input
          id="email"
          type="email"
          autocomplete="username"
          required>
      </label>

      <label>
        Senha
        <input
          id="senha"
          type="password"
          autocomplete="current-password"
          required>
      </label>

      <button id="entrarBtn" type="submit">
        Entrar no painel
      </button>

    </form>

    <div id="mensagem" class="mensagem"></div>

    <a
      class="voltar"
      href="https://angelsesteticaanimal.github.io/Angels-Estetica/cliente.html">
      Ir para a área do cliente
    </a>

  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    const mensagem = document.getElementById("mensagem");
    const entrarBtn = document.getElementById("entrarBtn");
    const loginForm = document.getElementById("loginForm");

    function mostrarMensagem(texto, tipo) {
      mensagem.textContent = texto;
      mensagem.className = "mensagem " + tipo;
    }

    try {
      if (!firebase.apps.length) {
        firebase.initializeApp(window.firebaseConfig);
      }

      const auth = firebase.auth();

      auth.onAuthStateChanged((usuario) => {
        if (usuario) {
          window.location.replace("index.html");
        }
      });

      loginForm.addEventListener("submit", async (evento) => {
        evento.preventDefault();

        const email = document.getElementById("email").value.trim();
        const senha = document.getElementById("senha").value;

        entrarBtn.disabled = true;
        entrarBtn.textContent = "Entrando...";

        try {
          await auth.signInWithEmailAndPassword(email, senha);

          mostrarMensagem(
            "Login realizado. Abrindo o painel...",
            "sucesso"
          );

          window.location.replace("index.html");
        } catch (erro) {
          console.error(erro);

          let texto = "Não foi possível entrar. Confira o e-mail e a senha.";

          if (erro.code === "auth/too-many-requests") {
            texto = "Muitas tentativas. Aguarde alguns minutos.";
          }

          mostrarMensagem(texto, "erro");
        } finally {
          entrarBtn.disabled = false;
          entrarBtn.textContent = "Entrar no painel";
        }
      });
    } catch (erro) {
      console.error(erro);

      mostrarMensagem(
        "Erro ao conectar ao Firebase.",
        "erro"
      );
    }
  </script>

</body>
</html>
